<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Left ear -->
  <polygon points="8,28 4,4 22,20" fill="#F5A623" stroke="#E8951E" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right ear -->
  <polygon points="56,28 60,4 42,20" fill="#F5A623" stroke="#E8951E" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner left ear -->
  <polygon points="10,25 8,10 20,20" fill="#FFD4A0"/>
  <!-- Inner right ear -->
  <polygon points="54,25 56,10 44,20" fill="#FFD4A0"/>
  <!-- Head -->
  <ellipse cx="32" cy="36" rx="24" ry="22" fill="#F5A623"/>
  <!-- White face patch -->
  <ellipse cx="32" cy="40" rx="16" ry="14" fill="#FFF3E0"/>
  <!-- Left eye -->
  <ellipse cx="23" cy="33" rx="4.5" ry="5" fill="#FFFFFF"/>
  <ellipse cx="23.5" cy="33.5" rx="2.8" ry="3.2" fill="#3D3D3D"/>
  <circle cx="22" cy="32" r="1.2" fill="#FFFFFF"/>
  <!-- Right eye -->
  <ellipse cx="41" cy="33" rx="4.5" ry="5" fill="#FFFFFF"/>
  <ellipse cx="41.5" cy="33.5" rx="2.8" ry="3.2" fill="#3D3D3D"/>
  <circle cx="40" cy="32" r="1.2" fill="#FFFFFF"/>
  <!-- Nose -->
  <polygon points="32,40 29.5,43 34.5,43" fill="#FF8A80" stroke="none"/>
  <!-- Mouth -->
  <path d="M29.5,43 Q32,47 34.5,43" fill="none" stroke="#D4A08A" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M32,43 L32,45" fill="none" stroke="#D4A08A" stroke-width="1" stroke-linecap="round"/>
  <!-- Left whiskers -->
  <line x1="4" y1="37" x2="18" y2="39" stroke="#D4A08A" stroke-width="1" stroke-linecap="round"/>
  <line x1="5" y1="42" x2="18" y2="42" stroke="#D4A08A" stroke-width="1" stroke-linecap="round"/>
  <line x1="6" y1="47" x2="18" y2="45" stroke="#D4A08A" stroke-width="1" stroke-linecap="round"/>
  <!-- Right whiskers -->
  <line x1="60" y1="37" x2="46" y2="39" stroke="#D4A08A" stroke-width="1" stroke-linecap="round"/>
  <line x1="59" y1="42" x2="46" y2="42" stroke="#D4A08A" stroke-width="1" stroke-linecap="round"/>
  <line x1="58" y1="47" x2="46" y2="45" stroke="#D4A08A" stroke-width="1" stroke-linecap="round"/>
</svg>
