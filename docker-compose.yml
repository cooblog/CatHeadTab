services:
  catheadtab-db:
    image: postgres:17-alpine
    container_name: catheadtab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catheadtab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-catheadtab}
      # 设置时区，保持与宿主机一致
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # 数据库文件映射到本机 ./data/postgres 目录，方便备份和查看
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catheadtab}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - catheadtab-net

  catheadtab-backend:
    build: ./backend
    container_name: catheadtab-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      # ---- Core ----
      # 数据库连接字符串（自动生成，指向 Docker 网络内的数据库容器）
      - DB_DSN=postgres://${POSTGRES_USER:-catheadtab}:${POSTGRES_PASSWORD:-secretpassword}@catheadtab-db:5432/${POSTGRES_DB:-catheadtab}?sslmode=disable
      # JWT 签名密钥 — 生产环境务必修改！
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      # 服务监听端口
      - PORT=${PORT:-8080}
      # Gin 框架模式: debug / release / test
      - GIN_MODE=${GIN_MODE:-debug}
      # 前端 URL（用于邮件中的链接：邮箱验证、密码重置）
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:${FRONTEND_PORT:-80}}
      # 后端 URL（外部可访问，用作 OAuth redirect_uri）
      - BACKEND_URL=${BACKEND_URL:-http://localhost:${PORT:-8080}}

      # ---- SMTP Email (可选，用于邮箱验证和密码重置) ----
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@catheadtab.com}
      # 使用隐式 SSL 连接（端口 465/994）设为 true，STARTTLS（端口 587）设为 false 或留空
      - SMTP_SSL=${SMTP_SSL:-false}

      # ---- GitHub OAuth (可选，用于 SSO 登录) ----
      # 在此创建: https://github.com/settings/developers
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}

      # ---- Google OAuth (可选，用于 SSO 登录) ----
      # 在此创建: https://console.cloud.google.com/apis/credentials
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}

      # ---- Wallpaper Source: Wallhaven (可选) ----
      # 在此获取 API Key: https://wallhaven.cc/settings/account
      # 没有 Key 也可以使用（仅 SFW），有 Key 则可以获取 Sketchy 内容
      - WALLHAVEN_API_KEY=${WALLHAVEN_API_KEY:-}
      # 允许的纯净度级别: sfw, sketchy, nsfw（逗号分隔），默认: sfw
      # "sketchy" 和 "nsfw" 需要设置 WALLHAVEN_API_KEY
      - WALLHAVEN_PURITY=${WALLHAVEN_PURITY:-sfw}

      # ---- Wallpaper Source: Tencent Cloud COS (可选) ----
      # 配置后可从 COS 对象存储搜索壁纸
      - COS_SECRET_ID=${COS_SECRET_ID:-}
      - COS_SECRET_KEY=${COS_SECRET_KEY:-}
      - COS_BUCKET=${COS_BUCKET:-}
      - COS_REGION=${COS_REGION:-}
      # COS 目录前缀：原图和缩略图分开存储，文件名一一对应
      - COS_ORIGINAL_PREFIX=${COS_ORIGINAL_PREFIX:-}
      - COS_THUMB_PREFIX=${COS_THUMB_PREFIX:-}

      # ---- Pro 会员门控 (可选) ----
      # 设为 true 启用 Pro 角色限制（SaaS 部署），不设则所有用户全功能（自部署）
      - PRO_GATE_ENABLED=${PRO_GATE_ENABLED:-false}
      # 在此日期前注册的用户自动成为 Pro（ISO 8601），不设则不启用早鸟活动
      - PRO_FREE_UNTIL=${PRO_FREE_UNTIL:-}

      # ---- Token 有效期配置 (可选) ----
      # 邮箱验证 Token 有效期（小时），默认: 24
      - EMAIL_VERIFY_TOKEN_TTL_HOURS=${EMAIL_VERIFY_TOKEN_TTL_HOURS:-24}
      # 密码重置 Token 有效期（分钟），默认: 5
      - PASSWORD_RESET_TOKEN_TTL_MINUTES=${PASSWORD_RESET_TOKEN_TTL_MINUTES:-5}
      # JWT 登录 Token 有效期（天），默认: 30
      - JWT_TOKEN_TTL_DAYS=${JWT_TOKEN_TTL_DAYS:-30}
      # 过期 Token 清理间隔（小时），默认: 6
      - TOKEN_CLEANUP_INTERVAL_HOURS=${TOKEN_CLEANUP_INTERVAL_HOURS:-6}

      # ---- Logging (可选) ----
      # 日志级别: debug / info / warn / error，默认: info
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # 日志文件路径（容器内路径，映射到宿主机 ./data/logs/），留空则仅输出到控制台
      - LOG_FILE=${LOG_FILE:-/app/logs/app.log}
      # 单个日志文件最大体积（MB），默认: 100
      - LOG_MAX_SIZE_MB=${LOG_MAX_SIZE_MB:-100}
      # 旧日志文件保留天数，默认: 30
      - LOG_MAX_AGE_DAYS=${LOG_MAX_AGE_DAYS:-30}
      # 旧日志文件最大保留数量，默认: 10
      - LOG_MAX_BACKUPS=${LOG_MAX_BACKUPS:-10}
      # 是否 gzip 压缩轮转后的日志文件，默认: false
      - LOG_COMPRESS=${LOG_COMPRESS:-false}

      # ---- Server-side AI (可选) ----
      # 配置后 Pro/Admin 用户可直接使用 AI，无需自己配置 API Key
      # 支持任何 OpenAI 兼容 API（OpenAI、DeepSeek、智谱、Kimi 等）
      - AI_PROVIDER=${AI_PROVIDER:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      # 每用户每分钟最大 AI 请求数，默认: 20
      - AI_RATE_LIMIT_RPM=${AI_RATE_LIMIT_RPM:-20}
      # 每用户每天最大 Token 用量，0 = 不限，默认: 100000
      - AI_DAILY_TOKEN_LIMIT=${AI_DAILY_TOKEN_LIMIT:-100000}

      # 时区
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      # 日志文件映射到本机 ./data/logs 目录，方便查看和备份
      - ./data/logs:/app/logs
    depends_on:
      catheadtab-db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - catheadtab-net

  catheadtab-frontend:
    build: ./frontend
    container_name: catheadtab-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      # 后端 API 地址（运行时注入到前端 JS 中）
      # 留空则前端使用相对路径 /api，由 nginx 反代到后端（推荐同域部署）
      # 跨域部署时设为完整 URL，如 https://api.catheadtab.com
      - VITE_API_URL=${VITE_API_URL:-}
    depends_on:
      - catheadtab-backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - catheadtab-net

networks:
  catheadtab-net:
    driver: bridge
