services:
  catheadtab-db:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catheadtab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-catheadtab}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catheadtab}"]
      interval: 5s
      timeout: 5s
      retries: 5

  catheadtab-backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      # ---- Core ----
      # Database connection string (auto-generated, points to the DB container inside Docker network)
      - DB_DSN=postgres://${POSTGRES_USER:-catheadtab}:${POSTGRES_PASSWORD:-secretpassword}@catheadtab-db:5432/${POSTGRES_DB:-catheadtab}?sslmode=disable
      # JWT signing secret — CHANGE THIS in production!
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      # Server listen port
      - PORT=${PORT:-8080}
      # Gin framework mode: debug / release / test
      - GIN_MODE=${GIN_MODE:-debug}
      # Frontend URL (used in email links: verification, password reset)
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:${FRONTEND_PORT:-80}}

      # ---- SMTP Email (optional, for email verification & password reset) ----
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@catheadtab.com}

      # ---- GitHub OAuth (optional, for SSO login) ----
      # Create at: https://github.com/settings/developers
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}

      # ---- Google OAuth (optional, for SSO login) ----
      # Create at: https://console.cloud.google.com/apis/credentials
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}

      # ---- Wallpaper Source: Wallhaven (optional) ----
      # Get your API key at: https://wallhaven.cc/settings/account
      # Without a key the provider still works (SFW only); with a key you also get Sketchy content.
      - WALLHAVEN_API_KEY=${WALLHAVEN_API_KEY:-}
      # Allowed purity levels: sfw, sketchy, nsfw (comma-separated). Default: sfw.
      # "sketchy" and "nsfw" require WALLHAVEN_API_KEY to be set.
      - WALLHAVEN_PURITY=${WALLHAVEN_PURITY:-sfw}
    depends_on:
      catheadtab-db:
        condition: service_healthy

  catheadtab-frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - catheadtab-backend

volumes:
  pgdata:
